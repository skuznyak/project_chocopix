# Include this file inside `server { ... }` before the generic `/` and `/api` locations.
# Reduces public technical surface without affecting storefront routes.

autoindex off;

location = /api {
    return 404;
}

location = /api/health {
    allow 127.0.0.1;
    allow ::1;
    deny all;

    proxy_pass http://localhost:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ~* ^/(?:admin|dev|test|debug|codex|sandbox|playground)(?:/|$) {
    return 404;
}

location ~ /\.(?!well-known(?:/|$)) {
    return 404;
}

location ~* ^/(?:package\.json|package-lock\.json|pnpm-lock\.yaml|yarn\.lock|tsconfig(?:\.[^/]+)?\.json|vite\.config\.[^/]+|docker-compose(?:\.[^/]+)?\.ya?ml|Dockerfile(?:\.[^/]+)?|README\.md|AGENT_ADD_CARD\.md|SEO_AGENT\.md|SEO_AUDIT_.*\.md|SEO_CONTENT_AUDIT_.*\.md|NOVA_POSHTA_INTEGRATION\.md|leanding\.md)$ {
    return 404;
}

location ~* \.(?:env|ini|log|sh|bak|old|sql|sqlite)$ {
    return 404;
}
